<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Master Reward</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#000;
  color:#fff;
  text-align:center;
}

/* CONTAINER */
.container{
  max-width:350px;
  margin:60px auto;
  background:#111;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,255,255,0.2);
}

/* TITLE */
h2{
  color:#66ccff;
  text-shadow:0 0 10px #66ccff;
}

/* INPUT */
input, select{
  width:90%;
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:none;
}

/* BUTTON */
button{
  width:90%;
  padding:14px;
  background:#00ffaa;
  border:none;
  border-radius:10px;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
}

/* LOADING */
.bar{
  width:90%;
  height:20px;
  background:#222;
  border-radius:10px;
  margin:20px auto;
  overflow:hidden;
  display:none;
}

.progress{
  width:0%;
  height:100%;
  background:#00ffaa;
}

/* STATUS */
.status{
  font-size:14px;
  margin-top:10px;
}

/* FINAL BUTTON */
.link-btn{
  display:none;
  margin-top:15px;
  padding:14px;
  background:#ff4da6;
  color:#fff;
  text-decoration:none;
  border-radius:10px;
  font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>🎰 Coin Master Reward</h2>

<input type="text" id="user" placeholder="Enter Username">

<select id="amount">
<option>Select Reward</option>
<option>10,000 Coins</option>
<option>50,000 Coins</option>
<option>100,000 Coins</option>
</select>

<button onclick="start()">Continue</button>

<div class="bar" id="bar">
  <div class="progress" id="prog"></div>
</div>

<div class="status" id="status"></div>

<a href="https://appchecker.space/cl/i/271x3k" id="finalBtn" class="link-btn">
Continue
</a>

</div>

<script>
function start(){
 let user=document.getElementById("user").value;
 let amount=document.getElementById("amount").value;

 if(user=="" || amount=="Select Reward"){
  alert("Please complete all fields");
  return;
 }

 document.getElementById("bar").style.display="block";

 let p=0;
 let prog=document.getElementById("prog");
 let status=document.getElementById("status");

 let i=setInterval(()=>{
  p+=10;
  prog.style.width=p+"%";

  if(p==20) status.innerText="Connecting...";
  if(p==40) status.innerText="Checking account...";
  if(p==60) status.innerText="Preparing reward...";
  if(p==80) status.innerText="Finalizing...";
  
  if(p>=100){
    clearInterval(i);
    status.innerText="Success! Click continue below.";
    document.getElementById("finalBtn").style.display="block";
  }

 },400);
}
</script>

</body>
</html>
