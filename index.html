<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Master Rewards</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#d9b38c;
  text-align:center;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:20px;
}

.header img{
  width:50px;
}

.header h1{
  color:#00cfff;
  text-shadow:0 0 5px #000;
  font-size:22px;
}

/* TOP BUTTON */
.top-btn{
  background:#2ecc71;
  color:#fff;
  padding:12px;
  border-radius:10px;
  margin:10px auto;
  width:90%;
  font-weight:bold;
}

/* BOX */
.box{
  background:#e6c8a0;
  margin:15px;
  padding:15px;
  border-radius:10px;
  border:2px solid #b98b5f;
  font-size:14px;
}

/* GRID */
.grid{
  display:flex;
  justify-content:center;
  gap:15px;
  padding:10px;
  flex-wrap:wrap;
}

/* CARD */
.card{
  width:160px;
  background:#f2e1c2;
  border-radius:15px;
  box-shadow:0 5px 10px rgba(0,0,0,0.2);
  overflow:hidden;
}

/* IMAGE */
.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

/* TEXT */
.card h3{
  font-size:14px;
  padding:10px;
}

/* TAG */
.tag{
  background:#ff0066;
  color:#fff;
  padding:5px;
  font-size:12px;
}

/* BUTTON */
.btn{
  display:block;
  background:#2ecc71;
  color:#fff;
  padding:10px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="https://www.image2url.com/r2/default/images/1776332081534-a47ab30a-b16f-44a1-9a02-adb24e0a6527.png">
  <h1>COIN MASTER REWARDS</h1>
</div>

<div class="top-btn">
  COIN MASTER FREE SPINS OFFERS
</div>

<div class="box">
  <b>INSTRUCTIONS HOW TO COLLECT REWARDS</b><br><br>
  1. Choose one reward<br>
  2. Complete the offer<br>
  3. Wait for verification
</div>

<div class="grid">

  <!-- HADIAH 1 -->
  <div class="card">
    <img src="https://www.image2url.com/r2/default/images/1776332803222-a77e4d0d-b7af-4c59-9dea-56da4a9344ec.jpg">
    <h3>Claim Big Reward</h3>
    <div class="tag">BEST OFFER</div>
    <a href="https://appchecker.space/cl/i/271x3k" class="btn">10,000 SPINS</a>
  </div>

  <!-- HADIAH 2 -->
  <div class="card">
    <img src="https://www.image2url.com/r2/default/images/1776332920986-f203cbff-8fe6-461e-bf10-6e13183eba3b.jpg">
    <h3>Special Bonus Reward</h3>
    <div class="tag">POPULAR</div>
    <a href="https://appchecker.space/cl/i/271x3k" class="btn">7,500 SPINS</a>
  </div>

</div>

</body>
</html>
